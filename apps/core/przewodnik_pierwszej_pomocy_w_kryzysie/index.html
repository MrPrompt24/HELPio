<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przewodnik Pierwszej Pomocy w Kryzysie</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <button id="back-btn" class="hidden"><i class="fas fa-arrow-left"></i></button>
            <h1>Przewodnik Kryzysowy</h1>
            <button id="info-btn"><i class="fas fa-info-circle"></i></button>
        </header>

        <section id="pinned-section" class="pinned-section hidden">
            <h2><i class="fas fa-thumbtack"></i> Przypięte Procedury</h2>
            <div id="pinned-container" class="cards-grid">
                <!-- Pinned items will be injected here -->
            </div>
        </section>

        <main id="main-menu" class="main-menu">
            <div class="cards-grid">
                <div class="card category-card" data-category="emotional">
                    <div class="icon-wrapper emotional">
                        <i class="fas fa-heart-broken"></i>
                    </div>
                    <h3>Kryzys Emocjonalny</h3>
                    <p>Stabilizacja, oddech, uziemienie</p>
                </div>
                <div class="card category-card" data-category="online">
                    <div class="icon-wrapper online">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3>Zagrożenia Online</h3>
                    <p>Harasment, oszustwa, cyberprzemoc</p>
                </div>
                <div class="card category-card" data-category="emergency">
                    <div class="icon-wrapper emergency">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h3>Sytuacje Awaryjne</h3>
                    <p>Zagrożenie życia, telefony pomocowe</p>
                </div>
            </div>
        </main>

        <section id="detail-view" class="detail-view hidden">
            <!-- Content will be injected here -->
        </section>
        
        <div id="offline-status" class="hidden">Tryb offline</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
