<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>HELPio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .box {
            max-width: 520px;
            background: #020617;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,.4);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: #38bdf8;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            margin: 16px 0;
        }

        .cta {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 28px;
            background: #38bdf8;
            color: #020617;
            text-decoration: none;
            font-weight: 600;
            border-radius: 999px;
            transition: transform .15s ease, box-shadow .15s ease;
        }

        .cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56,189,248,.35);
        }

        .note {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Dziękujemy za wiadomość 🙌</h1>

        <p>
            Twój e-mail został poprawnie wysłany.<br>
            Odpowiemy maksymalnie w ciągu <strong>24 godzin</strong>.
        </p>

        <a href="https://helpio24.eu/app" class="cta">
            ← Wróć do aplikacji
        </a>

        <div class="note">
            Jeśli nie otrzymasz odpowiedzi, sprawdź folder SPAM.
        </div>
    </div>

</body>
</html>
